<!-- Static skeleton for Netlify Forms build-time detection -->
<html>
  <body>
    <!-- Posdok Registration Form -->
    <form name="pondok-registration" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="posdok-registration" />
      <input name="bot-field" />
      <input name="nama" />
      <input name="telepon" />
      <input name="email" />
      <select name="program"></select>
      <select name="pendidikan_terakhir"></select>
      <input name="institusi" />
      <input name="alamat" />
      <textarea name="motivasi"></textarea>
      <select name="sumber_info"></select>
    </form>
  </body>
</html>
